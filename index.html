<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Sevin Cafe | منو</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cinzel:wght@500;600&family=Dancing+Script:wght@600&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/hero.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/menu.css">
<link rel="stylesheet" href="css/cart.css">
<link rel="stylesheet" href="css/footer.css">
</head>
<body>

<header class="hero">
  <span class="stain"></span><span class="stain"></span><span class="stain"></span>

  <div class="corner-badge-left" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 21c-4-3-8-7-8-12a8 8 0 0 1 16 0c0 5-4 9-8 12Z"/>
      <path d="M12 21V9"/>
    </svg>
  </div>

  <div class="corner-badge">
    <img src="assets/logo.jpg" alt="لوگوی سوین">
  </div>

  <div class="hero-eyebrow">منوی دیجیتال</div>
  <h1 class="wordmark">SEVIN</h1>
  <p class="wordmark-sub">CAFE</p>
  <p class="script-tag">My coffee is strong, and so am I</p>
  <p class="tagline">گوشه‌ای آرام برای یک فنجان قهوه‌ی خوب و یک لحظه‌ی بی‌عجله</p>
  <div class="steam-line"></div>
</header>

<div class="nav-wrap">
  <nav class="nav-scroll" id="navScroll"><!-- filled by js/menuRenderer.js --></nav>
</div>

<main id="menuMain"><!-- filled by js/menuRenderer.js --></main>

<footer>
  <div class="brand">سوین</div>
  <p>خیابان ولیعصر، کوچه‌ی نسترن، پلاک ۱۲</p>
  <div class="divider"></div>
  <p>هر روز ۸ صبح تا ۱۱ شب &nbsp;·&nbsp; instagram.com/savin.cafe</p>
</footer>

<div class="cart-drawer" id="cartDrawer">
  <h3>سفارش شما</h3>
  <div id="cartRows"><!-- filled by js/cartUI.js --></div>
  <button type="button" class="cart-clear" id="cartClear">پاک کردن سبد</button>
</div>

<div class="cart-bar" id="cartBar">
  <div class="cart-info">
    <span class="cart-count" id="cartCount">۰ آیتم</span>
    <span class="cart-total" id="cartTotal">۰ تومان</span>
  </div>
  <span class="cart-chevron">▲</span>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
